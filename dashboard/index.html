<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFinance — Microservices Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0c15] text-[#e2e8f0] font-['Inter'] min-h-screen overflow-x-hidden relative">

    <!-- Glowing Background Orbs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-violet-600/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>

    <!-- Header Navigation -->
    <nav class="border-b border-white/5 bg-[#0b0c15]/60 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 to-blue-500 flex items-center justify-center shadow-lg shadow-violet-500/20">
                <i class="fa-solid fa-building-columns text-white text-lg"></i>
            </div>
            <span class="font-['Outfit'] font-extrabold text-xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">AURA<span class="text-violet-500">FINANCE</span></span>
        </div>

        <div class="flex items-center gap-6">
            <!-- System Status Panel -->
            <div class="hidden md:flex items-center gap-4 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs font-semibold">
                <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> MySQL</div>
                <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Redis</div>
                <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Kafka</div>
            </div>

            <!-- User Status -->
            <div id="nav-user-info" class="flex items-center gap-3">
                <!-- Injected dynamically via app.js -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Auth Section (Shown if not logged in) -->
        <section id="auth-section" class="max-w-md mx-auto my-12 animate-fade-in">
            <div class="glass border border-white/10 rounded-3xl p-8 relative overflow-hidden shadow-2xl">
                <!-- Tab Headers -->
                <div class="flex border-b border-white/10 mb-6 text-center text-sm font-semibold">
                    <button id="tab-login" class="flex-1 pb-3 text-white border-b-2 border-violet-500 transition-all" onclick="switchAuthTab('login')">Sign In</button>
                    <button id="tab-register" class="flex-1 pb-3 text-slate-400 hover:text-white transition-all" onclick="switchAuthTab('register')">Register</button>
                </div>

                <!-- Alert Message -->
                <div id="auth-alert" class="hidden mb-4 p-4 rounded-xl text-sm flex items-center gap-2"></div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Email Address</label>
                        <input type="email" id="login-email" required placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <button type="submit" class="w-full py-3.5 mt-2 bg-gradient-to-r from-violet-600 to-blue-500 hover:from-violet-500 hover:to-blue-400 text-white rounded-xl font-bold text-sm shadow-lg shadow-violet-500/20 active:scale-[0.98] transition-all">
                        Sign In <i class="fa-solid fa-arrow-right ml-1"></i>
                    </button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="space-y-4 hidden" onsubmit="handleRegister(event)">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Full Name</label>
                        <input type="text" id="register-name" required placeholder="John Doe" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Email Address</label>
                        <input type="email" id="register-email" required placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Password</label>
                        <input type="password" id="register-password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <button type="submit" class="w-full py-3.5 mt-2 bg-gradient-to-r from-violet-600 to-blue-500 hover:from-violet-500 hover:to-blue-400 text-white rounded-xl font-bold text-sm shadow-lg shadow-violet-500/20 active:scale-[0.98] transition-all">
                        Create Account <i class="fa-solid fa-user-plus ml-1"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- Dashboard Section (Shown if logged in) -->
        <section id="dashboard-section" class="hidden space-y-8 animate-fade-in">
            <!-- Summary Row -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- User Profile Summary -->
                <div class="glass border border-white/10 rounded-3xl p-6 flex flex-col justify-between shadow-xl min-h-[200px]">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Welcome back,</span>
                            <h2 id="profile-name" class="font-['Outfit'] font-bold text-2xl text-white mt-1">John Doe</h2>
                            <p id="profile-email" class="text-sm text-slate-400">john@example.com</p>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center">
                            <i class="fa-solid fa-user-tie text-violet-400 text-xl"></i>
                        </div>
                    </div>
                    
                    <div class="border-t border-white/5 pt-4 mt-4 flex items-center justify-between text-xs text-slate-500">
                        <span>Profile Connected</span>
                        <button onclick="handleLogout()" class="text-red-400 hover:text-red-300 font-semibold flex items-center gap-1.5 transition-all">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </div>
                </div>

                <!-- Total Balance Metrics -->
                <div class="glass border border-white/10 rounded-3xl p-6 flex flex-col justify-between shadow-xl relative overflow-hidden">
                    <div class="absolute top-[-20%] right-[-10%] w-32 h-32 rounded-full bg-blue-500/10 blur-2xl"></div>
                    <div>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Net Worth</span>
                        <div class="flex items-baseline gap-2 mt-2">
                            <span class="text-sm text-slate-400 font-medium">$</span>
                            <h2 id="total-balance" class="font-['Outfit'] font-bold text-4xl text-white tracking-tight">0.00</h2>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="openOpenAccountModal()" class="flex-1 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl text-xs font-semibold flex items-center justify-center gap-2 transition-all">
                            <i class="fa-solid fa-plus text-violet-400"></i> Open Account
                        </button>
                    </div>
                </div>

                <!-- Transaction Shortcuts -->
                <div class="glass border border-white/10 rounded-3xl p-6 shadow-xl flex flex-col justify-between">
                    <div>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Transfer Funds</span>
                        <p class="text-xs text-slate-400 mt-1">Secure peer-to-peer transfer via Kafka ledger.</p>
                    </div>
                    <button onclick="scrollToTransfer()" class="w-full py-3.5 bg-gradient-to-r from-violet-600 to-blue-500 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2 shadow-lg shadow-violet-500/15 active:scale-[0.98] transition-all">
                        <i class="fa-solid fa-money-bill-transfer"></i> Start Transfer
                    </button>
                </div>
            </div>

            <!-- Accounts & Live Alerts Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Accounts Management -->
                <div class="lg:col-span-2 glass border border-white/10 rounded-3xl p-6 shadow-xl flex flex-col min-h-[400px]">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-2.5">
                            <i class="fa-solid fa-wallet text-violet-400 text-lg"></i>
                            <h3 class="font-['Outfit'] font-semibold text-lg text-white">Your Asset Accounts</h3>
                        </div>
                        <button onclick="refreshAccounts()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-all">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </div>

                    <!-- Accounts List -->
                    <div id="accounts-container" class="space-y-4 flex-1">
                        <!-- Injected dynamically via app.js -->
                    </div>
                </div>

                <!-- Notifications & Events Panel -->
                <div class="glass border border-white/10 rounded-3xl p-6 shadow-xl flex flex-col min-h-[400px]">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-2.5">
                            <i class="fa-solid fa-bell text-blue-400 text-lg"></i>
                            <h3 class="font-['Outfit'] font-semibold text-lg text-white">Live Alerts (Kafka)</h3>
                        </div>
                        <span id="alerts-count" class="px-2 py-0.5 rounded-full bg-blue-500/20 border border-blue-500/30 text-blue-400 text-[10px] font-bold">0 Alerts</span>
                    </div>

                    <!-- Alert Feeds -->
                    <div id="notifications-container" class="space-y-4 flex-1 overflow-y-auto max-h-[300px]">
                        <!-- Injected dynamically via app.js -->
                    </div>
                </div>
            </div>

            <!-- Transfer Funds Card -->
            <div id="transfer-panel" class="glass border border-white/10 rounded-3xl p-6 shadow-xl max-w-2xl mx-auto">
                <div class="flex items-center gap-2.5 mb-6">
                    <i class="fa-solid fa-paper-plane text-violet-400 text-lg"></i>
                    <h3 class="font-['Outfit'] font-semibold text-lg text-white">Secure Bank Transfer</h3>
                </div>

                <!-- Alert Message -->
                <div id="transfer-alert" class="hidden mb-4 p-4 rounded-xl text-sm flex items-center gap-2"></div>

                <form id="transfer-form" onsubmit="handleTransfer(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">From Account</label>
                            <select id="transfer-from" required class="w-full bg-[#0b0c15]/60 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                                <!-- Injected dynamically via app.js -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">To Account ID (Receiver)</label>
                            <input type="number" id="transfer-to" required placeholder="e.g. 2" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Amount ($)</label>
                        <input type="number" step="0.01" id="transfer-amount" required placeholder="0.00" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Reference / Description</label>
                        <input type="text" id="transfer-description" placeholder="Rent, dinner payment, utility bills..." class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                    </div>
                    <button type="submit" class="w-full py-4 mt-2 bg-gradient-to-r from-violet-600 to-blue-500 hover:from-violet-500 hover:to-blue-400 text-white rounded-xl font-bold text-sm shadow-lg shadow-violet-500/20 active:scale-[0.98] transition-all">
                        Execute Secure Transfer <i class="fa-solid fa-lock ml-1"></i>
                    </button>
                </form>
            </div>

        </section>

    </main>

    <!-- Modal: Open New Account -->
    <div id="new-account-modal" class="fixed inset-0 bg-[#020205]/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="glass border border-white/10 rounded-3xl p-6 w-full max-w-sm relative animate-fade-in shadow-2xl">
            <h3 class="font-['Outfit'] font-bold text-xl text-white mb-4">Open New Account</h3>
            <button onclick="closeOpenAccountModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-all"><i class="fa-solid fa-xmark text-lg"></i></button>

            <!-- Alert Message -->
            <div id="modal-alert" class="hidden mb-4 p-4 rounded-xl text-sm flex items-center gap-2"></div>

            <form onsubmit="handleCreateAccount(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Select Account Type</label>
                    <select id="modal-account-type" required class="w-full bg-[#0b0c15]/60 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                        <option value="SAVINGS">Savings Account</option>
                        <option value="CURRENT">Current / Checking Account</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-violet-600 to-blue-500 text-white rounded-xl font-bold text-sm active:scale-[0.98] transition-all">
                    Generate Bank Account <i class="fa-solid fa-plus ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Modal: Fund / Deposit Money -->
    <div id="fund-account-modal" class="fixed inset-0 bg-[#020205]/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6 hidden">
        <div class="glass border border-white/10 rounded-3xl p-6 w-full max-w-sm relative animate-fade-in shadow-2xl">
            <h3 class="font-['Outfit'] font-bold text-xl text-white mb-4">Deposit / Fund Account</h3>
            <button onclick="closeFundAccountModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-all"><i class="fa-solid fa-xmark text-lg"></i></button>
            <input type="hidden" id="fund-account-id">

            <!-- Alert Message -->
            <div id="fund-modal-alert" class="hidden mb-4 p-4 rounded-xl text-sm flex items-center gap-2"></div>

            <form onsubmit="handleFundAccount(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase">Deposit Amount ($)</label>
                    <input type="number" step="0.01" id="fund-amount" required placeholder="0.00" class="w-full bg-white/5 border border-white/10 focus:border-violet-500 focus:outline-none rounded-xl px-4 py-3 text-sm transition-all">
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-violet-600 to-blue-500 text-white rounded-xl font-bold text-sm active:scale-[0.98] transition-all">
                    Fund Account <i class="fa-solid fa-wallet ml-1"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Global Javascript -->
    <script src="app.js"></script>
</body>
</html>
